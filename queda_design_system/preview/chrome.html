<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:#060608;color:#F0EBE1;font-family:'DM Sans',system-ui,sans-serif;height:100%}
  .stage{min-height:100%;padding:48px 56px 28px;box-sizing:border-box;display:flex;flex-direction:column;gap:36px}

  /* Header */
  .hdr{display:flex;align-items:center;justify-content:space-between}
  .mark{font-family:'Syne',sans-serif;font-weight:800;font-size:40px;letter-spacing:-1.4px;color:#F0EBE1}
  .mark .d{color:#CDFF6C}
  .tokens{display:inline-flex;align-items:center;gap:10px;background:transparent;border:1px solid #222230;padding:10px 18px;border-radius:999px;font-family:'Syne',sans-serif;font-weight:800;font-size:16px;letter-spacing:-0.3px}
  .tokens .dot{width:7px;height:7px;border-radius:999px;background:#CDFF6C;box-shadow:0 0 10px rgba(205,255,108,0.9)}

  /* Tab nav */
  .nav{display:flex;align-items:center;justify-content:space-between;padding-top:28px;border-top:1px solid #222230}
  .tab{font-family:'Syne',sans-serif;font-weight:800;font-size:22px;letter-spacing:-0.6px;color:#3B3B48}
  .tab.active{color:#F0EBE1}
  .tab.active::after{content:'.';color:#CDFF6C}
  .fab{width:56px;height:56px;border-radius:999px;background:#CDFF6C;color:#060608;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:800;font-size:30px;line-height:1}

  .tick{display:flex;justify-content:space-between;font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#7A7A8A;padding-top:20px;border-top:1px solid #222230;margin-top:auto}
</style></head><body>
<div class="stage">
  <!-- Header -->
  <div class="hdr">
    <div class="mark">queda<span class="d">.</span></div>
    <div class="tokens"><span class="dot"></span>14</div>
  </div>

  <!-- Nav -->
  <div class="nav">
    <span class="tab active">Feed</span>
    <span class="tab">Mine</span>
    <span class="fab">+</span>
    <span class="tab">Me</span>
  </div>

  <div class="tick"><span>Chrome</span><span>Header · bottom nav · FAB</span></div>
</div>
</body></html>
