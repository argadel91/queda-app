<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:#060608;color:#F0EBE1;font-family:'DM Sans',system-ui,sans-serif;height:100%}
  .stage{min-height:100%;padding:56px 64px;box-sizing:border-box;display:flex;flex-direction:column;justify-content:center;gap:40px}
  .hero{font-family:'Syne',sans-serif;font-weight:800;font-size:84px;letter-spacing:-3px;line-height:0.88;margin:0;color:#F0EBE1}
  .hero .accent{color:#CDFF6C}
  .row{display:flex;gap:48px;align-items:center}
  .row svg{display:block}
  .lbl{font-size:10px;letter-spacing:2.2px;text-transform:uppercase;color:#7A7A8A;font-weight:700;margin-top:14px;text-align:center}
  .item{display:flex;flex-direction:column;align-items:center}
  .tick{display:flex;justify-content:space-between;font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#7A7A8A;padding-top:20px;border-top:1px solid #222230;margin-top:auto}
</style></head><body>
<div class="stage">
  <h1 class="hero">Almost<br/>no icons<span class="accent">.</span></h1>

  <div class="row">
    <div class="item">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#F0EBE1" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="4" y1="12" x2="20" y2="12"/><polyline points="14 6 20 12 14 18"/></svg>
      <div class="lbl">Arrow</div>
    </div>
    <div class="item">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#F0EBE1" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      <div class="lbl">Plus</div>
    </div>
    <div class="item">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#CDFF6C" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3" fill="#CDFF6C"/></svg>
      <div class="lbl" style="color:#CDFF6C">Live</div>
    </div>
  </div>

  <div class="tick"><span>Icons</span><span>Stroke 2 · three shapes</span></div>
</div>
</body></html>
