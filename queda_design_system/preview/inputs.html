<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:#060608;color:#F0EBE1;font-family:'DM Sans',system-ui,sans-serif;height:100%}
  .stage{min-height:100%;padding:56px;box-sizing:border-box;display:flex;flex-direction:column;justify-content:center;gap:36px}
  .field{display:flex;flex-direction:column;gap:14px}
  .label{font-size:10px;letter-spacing:2.4px;text-transform:uppercase;color:#7A7A8A;font-weight:700}
  .input{
    background:transparent;border:none;outline:none;color:#F0EBE1;
    font-family:'Syne',sans-serif;font-weight:800;font-size:40px;letter-spacing:-1.4px;
    padding:0 0 14px;border-bottom:2px solid #222230;
  }
  .input.focused{border-bottom-color:#CDFF6C}
  .caret{display:inline-block;width:3px;height:0.9em;background:#CDFF6C;vertical-align:middle;margin-left:4px;animation:bl 1s steps(2) infinite}
  @keyframes bl{50%{opacity:0}}
  .placeholder{color:#3B3B48}
  .tick{display:flex;justify-content:space-between;font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#7A7A8A;padding-top:20px;border-top:1px solid #222230;margin-top:auto}
</style></head><body>
<div class="stage">
  <div class="field">
    <div class="label">Title</div>
    <div class="input focused">Pickup football<span class="caret"></span></div>
  </div>
  <div class="field">
    <div class="label">When</div>
    <div class="input"><span class="placeholder">Tonight, 18:30</span></div>
  </div>
  <div class="tick"><span>Inputs</span><span>Underline · no box</span></div>
</div>
</body></html>
