<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:#060608;color:#F0EBE1;font-family:'DM Sans',system-ui,sans-serif;height:100%}
  .stage{min-height:100%;padding:56px;box-sizing:border-box;display:flex;flex-direction:column;justify-content:center;gap:32px}
  .row{display:flex;gap:12px;flex-wrap:wrap;align-items:center}
  .pill{padding:14px 24px;border-radius:999px;font-family:'Syne',sans-serif;font-weight:800;font-size:16px;letter-spacing:-0.3px}
  .pill.active{background:#CDFF6C;color:#060608}
  .pill.idle{background:transparent;color:#7A7A8A;border:1px solid #222230}
  .pill.solid{background:#16161C;color:#F0EBE1}
  .chip{display:inline-flex;align-items:center;gap:8px;padding:10px 14px;border-radius:999px;background:#16161C;font-size:13px;font-weight:600;color:#F0EBE1}
  .dot{width:7px;height:7px;border-radius:999px;background:#CDFF6C;box-shadow:0 0 10px rgba(205,255,108,0.9)}
  .tick{display:flex;justify-content:space-between;font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#7A7A8A;padding-top:20px;border-top:1px solid #222230;margin-top:auto}
</style></head><body>
<div class="stage">
  <div class="row">
    <span class="pill active">All</span>
    <span class="pill idle">Active</span>
    <span class="pill idle">Social</span>
    <span class="pill idle">Experience</span>
  </div>
  <div class="row">
    <span class="chip"><span class="dot"></span>Live · in 3 hours</span>
    <span class="chip">18:30</span>
    <span class="chip">Platt Fields</span>
  </div>
  <div class="tick"><span>Pills &amp; chips</span><span>Filter · meta · status</span></div>
</div>
</body></html>
