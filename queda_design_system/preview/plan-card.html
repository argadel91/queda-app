<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:#060608;color:#F0EBE1;font-family:'DM Sans',system-ui,sans-serif;height:100%}
  .stage{min-height:100%;padding:48px 56px 32px;box-sizing:border-box;display:flex;flex-direction:column;justify-content:center;gap:32px}
  .meta{display:flex;align-items:center;gap:12px;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:#CDFF6C;font-weight:700}
  .dot{width:8px;height:8px;border-radius:999px;background:#CDFF6C;box-shadow:0 0 12px rgba(205,255,108,1)}
  .title{font-family:'Syne',sans-serif;font-weight:800;font-size:56px;letter-spacing:-2.4px;line-height:0.92;color:#F0EBE1;margin:0}
  .facts{display:grid;grid-template-columns:1fr 1fr;gap:28px;padding-top:8px}
  .facts .k{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:#7A7A8A;font-weight:700;margin-bottom:8px}
  .facts .v{font-family:'Syne',sans-serif;font-weight:800;font-size:28px;letter-spacing:-0.8px;color:#F0EBE1}
  .foot{display:flex;align-items:center;justify-content:space-between;padding-top:8px}
  .avatars{display:flex;align-items:center;gap:14px;color:#7A7A8A;font-size:13px;font-weight:600}
  .av{display:flex}
  .av div{width:36px;height:36px;border-radius:999px;border:2px solid #060608;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;color:#060608}
  .av div+div{margin-left:-12px}
  .a1{background:#CDFF6C}.a2{background:#FFB36B}.a3{background:#6BC5FF}
  .cta{padding:14px 28px;background:#CDFF6C;color:#060608;border-radius:999px;font-family:'Syne',sans-serif;font-weight:800;font-size:16px;letter-spacing:-0.3px}
  .tick{display:flex;justify-content:space-between;font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#7A7A8A;padding-top:20px;border-top:1px solid #222230;margin-top:auto}
</style></head><body>
<div class="stage">
  <div class="meta"><span class="dot"></span>In 3 hours</div>
  <h1 class="title">Pickup football</h1>
  <div class="facts">
    <div><div class="k">When</div><div class="v">18:30</div></div>
    <div><div class="k">Where</div><div class="v">Platt Fields</div></div>
  </div>
  <div class="foot">
    <div class="avatars">
      <div class="av"><div class="a1">M</div><div class="a2">J</div><div class="a3">A</div></div>
      6/10
    </div>
    <span class="cta">Join →</span>
  </div>
  <div class="tick"><span>Plan card</span><span>Hero · time-anchored</span></div>
</div>
</body></html>
