<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:#060608;color:#F0EBE1;font-family:'DM Sans',system-ui,sans-serif;height:100%}
  .stage{min-height:100%;padding:48px 56px;box-sizing:border-box;display:flex;flex-direction:column;justify-content:center;gap:36px}
  .hero{font-family:'Syne',sans-serif;font-weight:800;font-size:96px;letter-spacing:-3.5px;line-height:0.88;margin:0;color:#F0EBE1}
  .hero span{color:#CDFF6C}
  .bars{display:flex;align-items:flex-end;gap:18px;height:56px}
  .bar{background:#F0EBE1;border-radius:2px}
  .b4{width:4px;height:4px}.b8{width:4px;height:8px}.b12{width:4px;height:12px}
  .b16{width:4px;height:16px}.b24{width:4px;height:24px}.b32{width:4px;height:32px}
  .b48{width:4px;height:48px}.b56{width:4px;height:56px;background:#CDFF6C}
  .meta{display:flex;justify-content:space-between;font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#7A7A8A}
  .tick{display:flex;justify-content:space-between;font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#7A7A8A;padding-top:20px;border-top:1px solid #222230}
</style></head><body>
<div class="stage">
  <h1 class="hero">4<span>·</span>8<span>·</span>16<span>·</span>32</h1>
  <div class="bars">
    <div class="bar b4"></div><div class="bar b8"></div><div class="bar b12"></div>
    <div class="bar b16"></div><div class="bar b24"></div><div class="bar b32"></div>
    <div class="bar b48"></div><div class="bar b56"></div>
  </div>
  <div class="tick"><span>Spacing</span><span>4-base · 10 stops</span></div>
</div>
</body></html>
