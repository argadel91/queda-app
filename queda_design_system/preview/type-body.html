<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:#060608;color:#F0EBE1;font-family:'DM Sans',system-ui,sans-serif;height:100%}
  .stage{min-height:100%;padding:48px 64px;box-sizing:border-box;display:flex;flex-direction:column;justify-content:center;gap:28px}
  .eyebrow{font-size:10px;letter-spacing:2.4px;text-transform:uppercase;color:#7A7A8A;font-weight:700}
  .line{font-family:'DM Sans';font-weight:400;font-size:28px;letter-spacing:-0.6px;line-height:1.2;color:#F0EBE1}
  .line b{font-weight:700}
  .tick{display:flex;justify-content:space-between;font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#7A7A8A;padding-top:20px;border-top:1px solid #222230}
</style></head><body>
<div class="stage">
  <div class="eyebrow">Body</div>
  <p class="line">Get off the couch. <b>Join something real</b> this week.</p>
  <div class="tick">
    <span>DM Sans 400 / 700</span>
    <span>28 / -0.6</span>
  </div>
</div>
</body></html>
