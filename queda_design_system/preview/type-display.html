<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:#060608;color:#F0EBE1;font-family:'DM Sans',system-ui,sans-serif;height:100%}
  .stage{min-height:100%;padding:56px 64px 32px;box-sizing:border-box;display:flex;flex-direction:column;justify-content:center;gap:24px}
  .hero{font-family:'Syne',sans-serif;font-weight:800;font-size:132px;letter-spacing:-5px;line-height:0.88;margin:0;color:#F0EBE1}
  .hero .dot{color:#CDFF6C}
  .tick{display:flex;justify-content:space-between;font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#7A7A8A;padding-top:20px;border-top:1px solid #222230}
</style></head><body>
<div class="stage">
  <h1 class="hero">queda<span class="dot">.</span></h1>
  <div class="tick">
    <span>Syne 800</span>
    <span>132 / -5</span>
    <span>Display</span>
  </div>
</div>
</body></html>
