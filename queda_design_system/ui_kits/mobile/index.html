<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>queda · Mobile UI Kit</title>
<link rel="stylesheet" href="../../colors_and_type.css"/>
<style>
  html,body{margin:0;padding:0;background:#0a0a0d;color:#F0EBE1;font-family:'DM Sans',system-ui,sans-serif;min-height:100vh}
  .wrap{display:flex;flex-direction:column;align-items:center;padding:40px 20px 60px;gap:28px}
  .header{text-align:center;max-width:680px}
  .header h1{font-family:'Syne',sans-serif;font-weight:800;font-size:32px;letter-spacing:-0.6px;margin:0 0 6px}
  .header h1 .dot{color:#CDFF6C}
  .header p{color:#7A7A8A;font-size:14px;margin:0;line-height:1.5}
  .lbl{font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:#7A7A8A;font-weight:700;margin-bottom:14px;text-align:center}
  .row{display:flex;gap:40px;flex-wrap:wrap;justify-content:center;align-items:flex-start}
  .variant{display:flex;flex-direction:column;align-items:center;gap:14px}
  .frame-shell{position:relative}
  /* Scale down the iOS frame so it reads as "phone" but fits a card */
  .phone{transform:scale(0.78);transform-origin:top center;margin-bottom:-22%}
</style>
</head>
<body>

<div class="wrap">
  <div class="header">
    <h1>queda mobile<span class="dot">.</span></h1>
    <p>Redesigned Feed screen · click through to tap plans, filter by category, or hit create.</p>
  </div>

  <div class="row" id="root"></div>
</div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="Shell.jsx"></script>
<script type="text/babel" src="PlanCards.jsx"></script>
<script type="text/babel" src="FeedScreen.jsx"></script>

<script type="text/babel" data-presets="react">
function App() {
  const [tab, setTab] = React.useState('feed');

  const feedContent = (
    <div style={{ background: Q.bg, minHeight: '100%', display: 'flex', flexDirection: 'column' }}>
      <Header tokens={14} unread={2} />
      <div style={{ flex: 1, overflow: 'auto' }}>
        <FeedScreen onOpen={(p) => console.log('open', p)} />
      </div>
      <BottomNav active={tab} onNav={setTab} />
    </div>
  );

  return (
    <>
      <div className="variant">
        <div className="lbl">Feed · redesigned</div>
        <div className="frame-shell"><div className="phone">
          <IOSDevice width={402} height={874} dark={true}>
            {/* Replace default nav chrome by hiding it — we render our own */}
            <div style={{
              height: '100%', background: Q.bg,
              paddingTop: 56 /* clear iOS status bar */
            }}>
              {feedContent}
            </div>
          </IOSDevice>
        </div></div>
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
